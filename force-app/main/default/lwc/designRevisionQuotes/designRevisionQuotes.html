<template>
	<div class="quotes-panel">
		<template lwc:if={isLoading}>
			<lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
		</template>

		<template lwc:elseif={hasError}>
			<p class="error-msg">{errorMessage}</p>
		</template>

		<template lwc:else>
			<div class="header-row">
				<span class="summary-pill">{materialCount} Material · {stampCount} Stamp</span>
			</div>

			<div class="cols">
				<div class="col">
					<p class="col-header">Material</p>
					<template for:each={materialQuotes} for:item="quote">
						<div key={quote.id} class={quote.cardClass}>

							<div class="quote-top">
								<div>
									<a class="quote-name" data-quoteid={quote.id} onclick={handleNavigateToRecord}>{quote.name}</a>
									<template lwc:if={quote.revNumber}>
										<div class="quote-rev">Rev: {quote.revNumber}</div>
									</template>
								</div>
							</div>

							<div class="quote-row">
								<span class="quote-total">{quote.grandTotalFormatted}</span>
								<div class="quote-row-end">
									<span class={quote.badgeClass}>{quote.status}</span>
									<lightning-button-icon
										data-quoteid={quote.id}
										icon-name="utility:edit"
										variant="border-filled"
										size="x-small"
										alternative-text="Change status"
										title="Change status"
										onclick={handleActionClick}>
									</lightning-button-icon>
								</div>
							</div>

							<div class="divider"></div>

							<div class="meta-row">
								<template lwc:if={quote.createdByName}>
									<div class="meta-item">
										<span class="meta-label">By:</span>
										<span class="meta-val">{quote.createdByName}</span>
									</div>
								</template>
								<template lwc:if={quote.expirationDate}>
									<div class="meta-item">
										<div class="expiry-row">
											<div class={quote.expiryDotClass}></div>
											<span class={quote.expiryTextClass}>
												Exp: {quote.expirationDate}
												<template lwc:if={quote.isExpiringSoon}>&nbsp;— expires soon</template>
											</span>
										</div>
									</div>
								</template>
							</div>

							<template lwc:if={quote.totalLineItems}>
								<div class="lines-section">
									<div class="lines-toggle" data-quoteid={quote.id} onclick={handleToggleLines}>
										<span class="lines-toggle-label">Line items</span>
										<div class="lines-toggle-right">
											<span class="line-count-pill">{quote.totalLineItems} items</span>
											<span class={quote.chevronClass}></span>
										</div>
									</div>
									<template lwc:if={quote.linesExpanded}>
										<div class="lines-list">
											<template for:each={quote.lineItems} for:item="li">
												<div key={li.productName} class="line-row">
													<span class="line-name">{li.productName}</span>
													<div class="line-right">
														<span class="line-qty">×{li.quantity}</span>
														<span class="line-price">{li.unitPrice}</span>
													</div>
												</div>
											</template>
										</div>
									</template>
								</div>
							</template>

						</div>
					</template>
					<template lwc:if={noMaterial}>
						<div class="empty">No Material quotes</div>
					</template>
				</div>

				<div class="col">
					<p class="col-header">Stamp</p>
					<template for:each={stampQuotes} for:item="quote">
						<div key={quote.id} class={quote.cardClass}>

							<div class="quote-top">
								<div>
									<a class="quote-name" data-quoteid={quote.id} onclick={handleNavigateToRecord}>{quote.name}</a>
									<template lwc:if={quote.revNumber}>
										<div class="quote-rev">Rev: {quote.revNumber}</div>
									</template>
								</div>
							</div>

							<div class="quote-row">
								<span class="quote-total">{quote.grandTotalFormatted}</span>
								<div class="quote-row-end">
									<span class={quote.badgeClass}>{quote.status}</span>
									<lightning-button-icon
										data-quoteid={quote.id}
										icon-name="utility:edit"
										variant="border-filled"
										size="x-small"
										alternative-text="Change status"
										title="Change status"
										onclick={handleActionClick}>
									</lightning-button-icon>
								</div>
							</div>

							<div class="divider"></div>

							<div class="meta-row">
								<template lwc:if={quote.createdByName}>
									<div class="meta-item">
										<span class="meta-label">By:</span>
										<span class="meta-val">{quote.createdByName}</span>
									</div>
								</template>
								<template lwc:if={quote.expirationDate}>
									<div class="meta-item">
										<div class="expiry-row">
											<div class={quote.expiryDotClass}></div>
											<span class={quote.expiryTextClass}>
												Exp: {quote.expirationDate}
												<template lwc:if={quote.isExpiringSoon}>&nbsp;— expires soon</template>
											</span>
										</div>
									</div>
								</template>
							</div>

							<template lwc:if={quote.totalLineItems}>
								<div class="lines-section">
									<div class="lines-toggle" data-quoteid={quote.id} onclick={handleToggleLines}>
										<span class="lines-toggle-label">Line items</span>
										<div class="lines-toggle-right">
											<span class="line-count-pill">{quote.totalLineItems} items</span>
											<span class={quote.chevronClass}></span>
										</div>
									</div>
									<template lwc:if={quote.linesExpanded}>
										<div class="lines-list">
											<template for:each={quote.lineItems} for:item="li">
												<div key={li.productName} class="line-row">
													<span class="line-name">{li.productName}</span>
													<div class="line-right">
														<span class="line-qty">×{li.quantity}</span>
														<span class="line-price">{li.unitPrice}</span>
													</div>
												</div>
											</template>
										</div>
									</template>
								</div>
							</template>

						</div>
					</template>
					<template lwc:if={noStamp}>
						<div class="empty">No Stamp quotes</div>
					</template>
				</div>
			</div>
		</template>
	</div>

	<template lwc:if={confirmModal.visible}>
		<div class="modal-overlay">
			<div class="modal-box">
				<p class="modal-title">Change Status</p>
				<p class="modal-quote-name">{confirmModal.quoteName}</p>
				<lightning-combobox
					label="Status"
					value={confirmModal.newStatus}
					options={statusOptions}
					onchange={handleModalStatusChange}>
				</lightning-combobox>
				<div class="modal-actions">
					<lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
					<lightning-button
						label="Confirm"
						variant="brand"
						disabled={isConfirmDisabled}
						onclick={handleConfirm}>
					</lightning-button>
				</div>
			</div>
		</div>
	</template>
</template>
