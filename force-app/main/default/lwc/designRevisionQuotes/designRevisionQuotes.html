<template>
	<div class="quotes-panel">
		<template lwc:if={isLoading}>
			<lightning-spinner alternative-text="Loading" size="small"></lightning-spinner>
		</template>

		<template lwc:elseif={hasError}>
			<p class="error-msg">{errorMessage}</p>
		</template>

		<template lwc:else>
			<div class="header-row">
				<lightning-button
					label="New Quote"
					variant="brand"
					icon-name="utility:add"
					onclick={handleNewQuote}>
				</lightning-button>
			</div>

			<div class="cols">
				<div class="col">
					<p class="col-header">Material</p>
					<template for:each={materialQuotes} for:item="quote">
						<div key={quote.id} class="quote-card">
							<a href={quote.recordUrl} class="quote-name">{quote.name}</a>
							<div class="quote-row">
								<span class="quote-total">{quote.grandTotalFormatted}</span>
								<div class="quote-row-end">
									<span class={quote.badgeClass}>{quote.status}</span>
									<lightning-button-icon
										data-quoteid={quote.id}
										icon-name="utility:edit"
										variant="border-filled"
										size="x-small"
										alternative-text="Change status"
										title="Change status"
										onclick={handleActionClick}>
									</lightning-button-icon>
								</div>
							</div>
							<template lwc:if={quote.expirationDate}>
								<div class="quote-expiry">Exp: {quote.expirationDate}</div>
							</template>
						</div>
					</template>
					<template lwc:if={noMaterial}>
						<div class="empty">No Material quotes</div>
					</template>
				</div>

				<div class="col">
					<p class="col-header">Stamp</p>
					<template for:each={stampQuotes} for:item="quote">
						<div key={quote.id} class="quote-card">
							<a href={quote.recordUrl} class="quote-name">{quote.name}</a>
							<div class="quote-row">
								<span class="quote-total">{quote.grandTotalFormatted}</span>
								<div class="quote-row-end">
									<span class={quote.badgeClass}>{quote.status}</span>
									<lightning-button-icon
										data-quoteid={quote.id}
										icon-name="utility:edit"
										variant="border-filled"
										size="x-small"
										alternative-text="Change status"
										title="Change status"
										onclick={handleActionClick}>
									</lightning-button-icon>
								</div>
							</div>
							<template lwc:if={quote.expirationDate}>
								<div class="quote-expiry">Exp: {quote.expirationDate}</div>
							</template>
						</div>
					</template>
					<template lwc:if={noStamp}>
						<div class="empty">No Stamp quotes</div>
					</template>
				</div>
			</div>
		</template>
	</div>

	<template lwc:if={confirmModal.visible}>
		<div class="modal-overlay">
			<div class="modal-box">
				<p class="modal-title">Change Status</p>
				<p class="modal-quote-name">{confirmModal.quoteName}</p>
				<lightning-combobox
					label="Status"
					value={confirmModal.newStatus}
					options={statusOptions}
					onchange={handleModalStatusChange}>
				</lightning-combobox>
				<div class="modal-actions">
					<lightning-button label="Cancel" onclick={handleCancel}></lightning-button>
					<lightning-button
						label="Confirm"
						variant="brand"
						disabled={isConfirmDisabled}
						onclick={handleConfirm}>
					</lightning-button>
				</div>
			</div>
		</div>
	</template>
</template>
